<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox e Radio</title>
</head>
<body>
    <form action="./"></form>
    <h3>Selecione uma estação do ano:</h3>
    <label for="opcao" >
        <input type="radio" name="opcao">Verão
    </label>
    <label for="opcao">
        <input type="radio" name="opcao">Inverno
    </label>
    <label for="opcao">
        <input type="radio"name="opcao">Primavera
    </label>
    <br><br>
    <h3>Marque seus cursos favoritos:</h3>
    <label for="opções">
        <input type="checkbox" name="opções" id="opções">T.I
    </label>
    <label for="opções">
        <input type="checkbox" name="opções" id="opções">Inglês
    </label>
    <label for="opções">
        <input type="checkbox" name="opções" id="opções">Administração
    </label>
</body>
</html>
