<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number, Password e Botões</title>
</head>
<body>
    <label for="quantidade">Número</label>
    <input type="number" id="quantidade" max="100" required placeholder="Digite uma quantidade" title="Quantidade">
    <br><br>
    <label for="Senha">Senha:</label>
    <input type="password" minlength="10" maxlength="30" required placeholder="Senha" title="Senha">
    <br><br>

    <label for="confirmação">Confirmação</label>
    <input type="submit" value="Enviar">
    <br><br>

    <label for="limpar">Limpa os dados do formulario</label>
    <input type="reset" value="Limpar">
</body>
</html>
