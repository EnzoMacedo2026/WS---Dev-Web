<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="/" method="post">
        <h2>Cadastro</h2>
        <label for="nome">Nome Completo:</label>
        <input type="text" name="nome" id="nome" placeholder="Digite seu nome completo" required>
        <br>
        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email" placeholder="exemplo@exemplo.com" required>
        <br>
        
        <label for="senha">Crie uma senha:</label>
        <input type="password" name="senha" id="senha" placeholder="Minímo 8 caracteres" minlength="8" required>
        <br>
        <label for="genero">Genêro:</label>
        <input type="radio" name="genero" id="genero" value="masculino">
        <label for="mascuino">Masculino</label>
        <input type="radio" name="genero" id="genero" value="feminino">
        <label for="feminino">Feminino</label>
        <input type="radio" name="genero" id="genero" value="outro">
        <label for="outro">Outro</label>
        <label for="data">Data de Nascimento:</label>
        <input type="date" name="data" id="data">
        <br>
        <label for="termos">
        <input type="checkbox" name="termos" id="termos" required>Aceito os Termos de Uso
    </label>
        <br>
        <button type="submit">Cadastrar</button>
    </form>
</body>
</html>
